<!DOCTYPE html>
<html>
<head>

<title>Signup</title>
<link rel="stylesheet" href="styles.css">

</head>


<div class="login-layout">
  <!-- Left: Logo and company -->
  <div class="login-left">
    <img src="../../../Assets/Collab_Dev_Icon_Logo.png" alt="Alderwell Logo" class="big-logo">
    <div class="company-title">
      <span class="company-main">Alderwell</span><br>
      <span class="company-sub">Pharmaceuticals</span>
    </div>
  </div>
  <!-- Right: Signup card -->
  <div class="login-card">
    <h2 class="welcome">Create Account</h2>
    <p class="subtitle">Sign up to access your campaign dashboard.</p>
    <form id="signup-form">
      <label class="input-label">EMAIL</label>
      <div class="input-group">
        <span class="input-icon"><svg width="18" height="18" fill="#aab0b6" viewBox="0 0 24 24"><path d="M2 4v16h20V4H2zm18 2v.511l-8 5.333-8-5.333V6h16zm0 12H4V8.489l8 5.333 8-5.333V18z"/></svg></span>
        <input type="email" id="email" placeholder="name@pharmacy.com" required>
      </div>
      <label class="input-label">PASSWORD</label>
      <div class="input-group">
        <span class="input-icon"><svg width="18" height="18" fill="#aab0b6" viewBox="0 0 24 24"><path d="M12 17a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm6-7V7a6 6 0 0 0-12 0v3a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2zm-8-3a4 4 0 0 1 8 0v3H6V7zm10 12H6v-7h12v7z"/></svg></span>
        <input type="password" id="password" placeholder="Create a password" required>
      </div>
      <button type="submit">Sign Up <span class="arrow">→</span></button>
    </form>
    <p id="message"></p>
    <div class="form-footer">
      <small>By signing up, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></small>
    </div>
  </div>
</div>

<script type="module">
import { supabase } from "../../js/supabaseClient.js"
const form = document.getElementById("signup-form")
const message = document.getElementById("message")
form.addEventListener("submit", async (e) => {
  e.preventDefault()
  const email = document.getElementById("email").value
  const password = document.getElementById("password").value
  const { error } = await supabase.auth.signUp({
    email: email,
    password: password
  })
  if(error){
    message.textContent = error.message
    message.className = 'error'
  } else {
    message.textContent = "Account created successfully"
    message.className = 'success'
  }
})
</script>

</body>
</html>

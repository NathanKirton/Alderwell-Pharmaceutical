<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alderwell Pharmaceuticals – Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="wrapper">

    <!-- LEFT BRAND PANEL -->
    <aside class="brand-panel">
        <div class="brand-inner">
            <img src="/Alderwell/Assets/Collab_Dev_Logo-.png" alt="Alderwell Logo" class="logo">
        </div>
    </aside>

    <!-- RIGHT LOGIN PANEL -->
    <main class="login-panel">
        <div class="login-box">

            <h2>Welcome Back</h2>
            <p class="subtitle">Please enter your credentials to access your campaign dashboard.</p>

            <form>
                <label>EMAIL OR USERNAME</label>
                <input type="email" placeholder="name@pharmacy.com">

                <label>PASSWORD</label>
                <div class="password-row">
                    <input type="password" placeholder="••••••••">
                    <a href="#" class="forgot">Forgot Password?</a>
                </div>

                <div class="checkbox-row">
                    <input type="checkbox" id="stay">
                    <label for="stay">Stay signed in for 30 days</label>
                </div>

                <button class="btn">Sign in to Dashboard →</button>

                <p class="terms">
                    By signing in, you agree to our 
                    <a href="#">Terms of Service</a> and 
                    <a href="#">Privacy Policy</a>.
                </p>

                <p class="copyright">
                    © 2026 PHARMACEUTICALS INC. All rights reserved.
                </p>
            </form>

        </div>
    </main>

</div>

</body>
</html>

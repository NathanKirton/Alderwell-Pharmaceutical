<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="NoRole.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Marketing and Sales Dashboard</title>
</head>
<body>


<div class="layout">

  <!-- TOP BAR -->
  <header class="topbar">
    <img src="/Assets/Collab_Dev_Logo-.png" class="company-logo" alt="Logo">

    <div class="topbar-right">
      <button class="notif-btn">
        <span class="notif-dot"></span>
        <i style="font-size:24px" class="fa">&#xf0f3;</i>
      </button>
    </div>
  </header>

  <!-- SIDEBAR (Desktop only) -->
  <aside class="sidebar">
    <nav class="sidebar-nav">

</nav>

    <div class="sidebar-profile">
      <div class="profile-img"></div>
      <div>
        <p class="profile-name">Alex Morgan</p>
        <p class="profile-role">Senior Specialist</p>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">
  <h1 class="page-title">You have no role, please ask admin to assign a role</h1>

</main>


  <!-- MOBILE NAV (Mobile only) -->
  <nav class="mobile-nav">
  </nav>

</div>

<script>
  const tabs = document.querySelectorAll('.sidebar-nav a');
  const contents = document.querySelectorAll('.tab-content');

  tabs.forEach(tab => {
    tab.addEventListener('click', e => {
      e.preventDefault();

      // Remove active from all tabs
      tabs.forEach(t => t.classList.remove('active'));

      // Add active to clicked tab
      tab.classList.add('active');

      // Hide all content sections
      contents.forEach(c => c.classList.remove('active'));

      // Show the matching section
      const target = tab.getAttribute('data-tab');
      document.getElementById(target).classList.add('active');
    });
  });
</script>

</body>
</html>
